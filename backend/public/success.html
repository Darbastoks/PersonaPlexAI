<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful | ChatVora</title>
  <style>
    :root {
      --bg: #0f172a;
      --text: #ffffff;
      --primary: #3b82f6;
      --accent: #8b5cf6;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .success-card {
      max-width: 500px;
      padding: 3rem;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      display: inline-block;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      background: linear-gradient(to right, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 1rem 2rem;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="icon">✅</div>
    <h1>Welcome to ChatVora!</h1>
    <p>Your payment was successful and your account is being provisioned.</p>
    <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin: 25px 0; text-align: left;">
      <p style="margin: 0; color: #94a3b8; font-size: 0.9rem;">Next Steps:</p>
      <ul style="margin: 10px 0 0 0; padding-left: 20px; color: #cbd5e1;">
        <li>Check your email for the 1-line install script.</li>
        <li>Paste the script into your website's <b>&lt;head&gt;</b>.</li>
        <li>Your AI assistant will appear instantly!</li>
      </ul>
    </div>
    <a href="/" class="btn">Back to Dashboard</a>
  </div>
</body>
</html>
